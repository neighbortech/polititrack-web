    <!-- SEO: Noscript fallback content for crawlers that don't execute JS -->
    <noscript>
      <div style="max-width:800px;margin:0 auto;padding:40px 20px;font-family:Georgia,serif;color:#333;">
        <h1>PolitiTrack — Political Donation Tracking API</h1>
        <p>PolitiTrack is an AI-powered API for tracking political donations, lobbying activity, and government contracts in American politics.</p>
        <h2>Data Sources</h2>
        <ul>
          <li>Federal Election Commission (FEC) — Campaign donations, PACs, candidates</li>
          <li>Senate Lobbying Disclosure Act (LDA) — Lobbying filings, spending, issues</li>
          <li>ProPublica Congress API — Roll-call votes, bills, member data</li>
          <li>Congress.gov — Full bill text, amendments, cosponsors</li>
          <li>USASpending.gov — Federal contracts and grants</li>
        </ul>
        <h2>API Endpoints</h2>
        <ul>
          <li>GET /api/v1/donations — Search donations by donor, recipient, party, amount, date</li>
          <li>GET /api/v1/donors/search — Search donors by name or employer</li>
          <li>GET /api/v1/donors/{id}/summary — Donor stats by party, year, top recipients</li>
          <li>GET /api/v1/analyze/donor/{id} — AI analysis of donation motivations</li>
          <li>GET /api/v1/analyze/ask — Natural language questions about political money</li>
        </ul>
        <h2>Pricing</h2>
        <ul>
          <li>Free: $0/month — 100 requests/day, basic donation search</li>
          <li>Pro: $49/month — 5,000 requests/day, AI analysis included</li>
          <li>Enterprise: $199/month — 50,000 requests/day, bulk exports, alerts</li>
        </ul>
        <h2>Use Cases</h2>
        <p>Journalists use PolitiTrack to investigate political money. Researchers study campaign finance patterns. Developers build political transparency tools. Advocates track industry influence on legislation.</p>
      </div>
