  <!-- Data source pills -->
  <rect x="80" y="470" width="80" height="32" rx="6" fill="rgba(230,57,70,0.15)"/>
  <text x="120" y="492" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#e63946">FEC</text>
  
  <rect x="172" y="470" width="120" height="32" rx="6" fill="rgba(212,168,67,0.15)"/>
  <text x="232" y="492" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#d4a843">Senate LDA</text>
  
  <rect x="304" y="470" width="120" height="32" rx="6" fill="rgba(69,123,157,0.15)"/>
  <text x="364" y="492" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#457b9d">ProPublica</text>
  
  <rect x="436" y="470" width="130" height="32" rx="6" fill="rgba(43,74,122,0.2)"/>
