<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#08090d"/>
  <rect width="1200" height="4" fill="#e63946"/>
  
  <!-- Logo -->
  <rect x="80" y="80" width="52" height="52" rx="10" fill="#e63946"/>
  <text x="106" y="116" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="700" fill="#fff">P</text>
  <text x="148" y="115" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#edf0f7">POLITI</text>
  <text x="303" y="115" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#e63946">TRACK</text>

  <!-- Main heading -->
